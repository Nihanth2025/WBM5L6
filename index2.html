<!DOCTYPE html>
<html lang="en">
<head>  
</head>
<body>
    <p>Enetr a number and click OK:</p>
    <input type="number" id="id" min="100" max="300" required>
    <button onclick="myFunction()">OK</button>
    <p>If the number is less than 100 or greater than 300, an error meassage will be displayed.</p>
    <p id="result"></p>

    <script>
        function myFunction() {
            var mybj = document.getElementById("id");
            if (!mybj.checkValidity()) {
                document.getElementById("result").innerHTML = mybj.validationMessage;
            } else {
                document.getElementById("result").innerHTML = "Input OK";
            }
        }
    </script>
</body>
</html>
